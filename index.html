<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SpotIt - Найди совпадение!</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px;
        }

        /* Плавающая верхняя панель */
        .top-panel {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 50px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .status {
            color: #ffd700;
            font-size: 0.85rem;
            font-family: monospace;
            font-weight: bold;
            white-space: nowrap;
            padding: 5px 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
        }

        .top-panel button {
            background: #0f3460;
            color: white;
            border: none;
            padding: 5px 14px;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            touch-action: manipulation;
            white-space: nowrap;
        }

        .top-panel button:active {
            transform: scale(0.95);
        }

        .timer-btn {
            background: #1a1a2e;
            color: #00ff00;
            font-size: 1rem;
            letter-spacing: 1px;
            font-family: monospace;
        }

        .new-btn {
            background: #e94560;
        }

        .cards-count {
            background: #533483;
        }

        /* Контейнер для канваса с центрированием */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex: 1;
            min-height: 0;
        }

        canvas {
            display: block;
            background: #0f3460;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            cursor: pointer;
            touch-action: manipulation;
            width: auto;
            height: auto;
            max-width: 95vw;
            max-height: 85vh;
            object-fit: contain;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1rem;
            background: rgba(0,0,0,0.85);
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 100;
            text-align: center;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        /* Горизонтальная ориентация */
        @media (orientation: landscape) {
            .top-panel {
                top: 15px;
                gap: 12px;
                padding: 8px 16px;
            }
            .status {
                font-size: 1rem;
                padding: 5px 15px;
            }
            .top-panel button {
                padding: 6px 16px;
                font-size: 0.9rem;
            }
            .timer-btn {
                font-size: 1.1rem;
            }
        }

        /* Вертикальная ориентация */
        @media (orientation: portrait) {
            .top-panel {
                top: 10px;
                gap: 6px;
                padding: 5px 10px;
            }
            .status {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
            .top-panel button {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            .timer-btn {
                font-size: 0.85rem;
            }
        }

        /* Очень маленькие экраны */
        @media (max-width: 500px) {
            .top-panel {
                gap: 4px;
                padding: 4px 8px;
            }
            .status {
                font-size: 0.6rem;
                padding: 2px 6px;
            }
            .top-panel button {
                padding: 3px 8px;
                font-size: 0.6rem;
            }
            .timer-btn {
                font-size: 0.75rem;
            }
        }

        /* Узкие экраны - перенос кнопок */
        @media (max-width: 420px) {
            .top-panel {
                flex-wrap: wrap;
                border-radius: 20px;
                width: auto;
                max-width: 95vw;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="canvas" width="900" height="500"></canvas>
        </div>
        
        <!-- Плавающая панель -->
        <div class="top-panel">
            <div class="status" id="status">🎯 Загрузка...</div>
            <button class="timer-btn" id="pauseBtn">00:00</button>
            <button class="cards-count" id="cardsCount">📦 0</button>
            <button class="new-btn" id="newBtn">🔄 Новая</button>
        </div>
    </div>

    <div id="loading" class="loading">Загрузка карточек... ⏳</div>

    <script src="/sp16/game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sp16/sw.js')
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
